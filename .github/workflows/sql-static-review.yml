name: SQL and repository static review
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  static-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install pyyaml
      - run: python tools/static_check.py
      - run: python tools/platform_static_check.py
      - run: python tools/generate_source_sbom.py
      - run: python tools/execution_phase_check.py
