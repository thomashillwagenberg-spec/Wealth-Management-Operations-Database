name: Deploy Azure reference environment
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        required: true
        options: [dev, staging, prod]
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Build deployable applications
        run: |
          dotnet restore WealthManagement.slnx
          dotnet publish src/WealthManagement.Api/WealthManagement.Api.csproj -c Release --no-restore -o artifacts/api
          dotnet publish src/WealthManagement.Web/WealthManagement.Web.csproj -c Release --no-restore -o artifacts/web
          (cd artifacts/api && zip -qr ../api.zip .)
          (cd artifacts/web && zip -qr ../web.zip .)
      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: azure/CLI@v3
        env:
          AZURE_SQL_ADMIN_LOGIN: ${{ vars.AZURE_SQL_ADMIN_LOGIN }}
          AZURE_SQL_ADMIN_OBJECT_ID: ${{ vars.AZURE_SQL_ADMIN_OBJECT_ID }}
          WM_API_AUDIENCE: ${{ vars.WM_API_AUDIENCE }}
          WM_ENTRA_AUTHORITY: ${{ vars.WM_ENTRA_AUTHORITY }}
          WM_WEB_CLIENT_ID: ${{ vars.WM_WEB_CLIENT_ID }}
          WM_WEB_API_SCOPE: ${{ vars.WM_WEB_API_SCOPE }}
          WM_ALERT_EMAIL: ${{ vars.WM_ALERT_EMAIL }}
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        with:
          inlineScript: |
            set -euo pipefail
            profile='${{ inputs.environment }}'
            az bicep install
            az deployment group what-if \
              --resource-group "$RESOURCE_GROUP" \
              --parameters "infra/bicep/parameters/${profile}.bicepparam"
            outputs=$(az deployment group create \
              --resource-group "$RESOURCE_GROUP" \
              --parameters "infra/bicep/parameters/${profile}.bicepparam" \
              --name "wmops-${profile}-${GITHUB_RUN_NUMBER}" \
              --query properties.outputs -o json)
            api_name=$(printf '%s' "$outputs" | jq -r '.apiAppName.value')
            web_name=$(printf '%s' "$outputs" | jq -r '.webAppName.value')
            az webapp deploy --resource-group "$RESOURCE_GROUP" --name "$api_name" --src-path artifacts/api.zip --type zip --clean true
            az webapp deploy --resource-group "$RESOURCE_GROUP" --name "$web_name" --src-path artifacts/web.zip --type zip --clean true
